<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI By — production-grade, plugin-first coding agent. PLAN/EXECUTE modes, MCP, sub-agents, persistent memory. OpenAI-compatible." />
    <meta name="theme-color" content="#ffffff" />
    <title>AI By — the coding agent that ships</title>
    <script>
      // Inline theme bootstrap to avoid flash
      (function () {
        try {
          var stored = localStorage.getItem('ai-by-theme');
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && sysDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch {}
      })();
    </script>
  </head>
  <body class="bg-white text-ink-800 antialiased dark:bg-ink-900 dark:text-ink-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
